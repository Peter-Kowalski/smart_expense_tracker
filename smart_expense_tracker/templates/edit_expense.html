<!DOCTYPE html>
<html>
<head>
    <title>Edit Expense</title>
</head>
<body>
    <h1>Edit Expense</h1>

    <form method="POST">
        <label>Title:</label><br>
        <input type="text" name="title" value="{{ expense.title }}" required><br><br>

        <label>Amount:</label><br>
        <input type="number" step="0.01" name="amount" value="{{ expense.amount }}" required><br><br>

        <label>Category:</label><br>
        <input type="text" name="category" value="{{ expense.category_name }}" required><br><br>

        <button type="submit">Update Expense</button>
    </form>

    <br>
    <a href="/expenses">Back to Expenses</a>
</body>
</html>
